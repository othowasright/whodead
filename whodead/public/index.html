<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WhoDead.com — Is this person still alive?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f5f0;
      --surface: #ffffff;
      --border: #e0ddd6;
      --text: #1a1917;
      --muted: #6b6860;
      --hint: #a09e99;
      --green-bg: #eaf5ee;
      --green-text: #1a6b35;
      --red-bg: #fdeeed;
      --red-text: #8b1f1f;
      --gray-bg: #f0eeea;
      --gray-text: #555350;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #16151a;
        --surface: #1e1d23;
        --border: #2e2d35;
        --text: #f0eeea;
        --muted: #a09e99;
        --hint: #6b6860;
        --green-bg: #0f2e1a;
        --green-text: #5ccb82;
        --red-bg: #2e1010;
        --red-text: #f08080;
        --gray-bg: #252429;
        --gray-text: #a09e99;
      }
    }

    body {
      font-family: 'DM Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 4rem 1.5rem 3rem;
    }

    .container {
      width: 100%;
      max-width: 580px;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: clamp(36px, 8vw, 56px);
      font-weight: 700;
      letter-spacing: -1.5px;
      line-height: 1;
      color: var(--text);
      margin-bottom: 6px;
    }

    .logo span { color: var(--muted); }

    .tagline {
      font-size: 11px;
      color: var(--hint);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 2.5rem;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 1rem;
    }

    input[type="text"] {
      flex: 1;
      font-family: 'DM Mono', monospace;
      font-size: 15px;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus { border-color: var(--muted); }
    input[type="text"]::placeholder { color: var(--hint); }

    button.lookup-btn {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      padding: 10px 20px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--text);
      color: var(--bg);
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
    }

    button.lookup-btn:hover { opacity: 0.85; }
    button.lookup-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .examples {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 2rem;
    }

    .ex-btn {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .ex-btn:hover { border-color: var(--muted); color: var(--text); }

    .loading {
      display: none;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--muted);
      padding: 1rem 0;
    }

    .loading.visible { display: flex; }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--hint);
      animation: pulse 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.15); }
    }

    .result-card {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      animation: fadeIn 0.3s ease;
    }

    .result-card.visible { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 100px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }

    .badge.alive { background: var(--green-bg); color: var(--green-text); }
    .badge.dead { background: var(--red-bg); color: var(--red-text); }
    .badge.unknown { background: var(--gray-bg); color: var(--gray-text); }

    .result-name {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.6rem;
      line-height: 1.2;
    }

    .result-summary {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.75;
    }

    .result-meta {
      margin-top: 1.25rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--hint);
      letter-spacing: 0.03em;
    }

    .error-msg {
      display: none;
      font-size: 13px;
      color: var(--red-text);
      background: var(--red-bg);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      line-height: 1.6;
    }

    .error-msg.visible { display: block; }

    .footer {
      margin-top: 3rem;
      font-size: 11px;
      color: var(--hint);
      text-align: center;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">who<span>dead</span>.com</div>
    <div class="tagline">Is this person still alive?</div>

    <div class="input-row">
      <input type="text" id="name-input" placeholder="Enter a name..." autocomplete="off" />
      <button class="lookup-btn" id="lookup-btn" onclick="lookup()">Look up</button>
    </div>

    <div class="examples">
      <button class="ex-btn" onclick="setName('Betty White')">Betty White</button>
      <button class="ex-btn" onclick="setName('Paul McCartney')">Paul McCartney</button>
      <button class="ex-btn" onclick="setName('Clint Eastwood')">Clint Eastwood</button>
      <button class="ex-btn" onclick="setName('David Bowie')">David Bowie</button>
      <button class="ex-btn" onclick="setName('Queen Elizabeth II')">Queen Elizabeth II</button>
      <button class="ex-btn" onclick="setName('Willie Nelson')">Willie Nelson</button>
    </div>

    <div class="loading" id="loading">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <span>Searching the web...</span>
    </div>

    <div class="error-msg" id="error-msg"></div>

    <div class="result-card" id="result-card">
      <div class="badge" id="badge"></div>
      <div class="result-name" id="result-name"></div>
      <div class="result-summary" id="result-summary"></div>
      <div class="result-meta" id="result-meta"></div>
    </div>

    <div class="footer">powered by claude + live web search</div>
  </div>

  <script>
    function setName(name) {
      document.getElementById('name-input').value = name;
      lookup();
    }

    document.getElementById('name-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') lookup();
    });

    async function lookup() {
      const name = document.getElementById('name-input').value.trim();
      if (!name) return;

      const loading = document.getElementById('loading');
      const resultCard = document.getElementById('result-card');
      const errorMsg = document.getElementById('error-msg');
      const btn = document.getElementById('lookup-btn');

      loading.classList.add('visible');
      resultCard.classList.remove('visible');
      errorMsg.classList.remove('visible');
      btn.disabled = true;

      try {
        const res = await fetch('/api/lookup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name })
        });

        const data = await res.json();

        if (!res.ok) throw new Error(data.error || 'Unknown error');

        document.getElementById('result-name').textContent = data.name || name;
        document.getElementById('result-summary').textContent = data.summary || 'No information found.';
        document.getElementById('result-meta').textContent = data.meta || '';

        const badge = document.getElementById('badge');
        const s = (data.status || 'unknown').toLowerCase();
        badge.className = 'badge ' + (s === 'alive' ? 'alive' : s === 'dead' ? 'dead' : 'unknown');
        badge.textContent = s === 'alive' ? 'alive' : s === 'dead' ? 'deceased' : 'unknown';

        resultCard.classList.add('visible');
      } catch (err) {
        errorMsg.textContent = 'Error: ' + err.message;
        errorMsg.classList.add('visible');
      } finally {
        loading.classList.remove('visible');
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
